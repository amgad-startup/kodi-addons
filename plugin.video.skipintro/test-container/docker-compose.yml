version: "3.8"

# Multi-architecture test matrix for Skip Intro addon
#
# Unit tests (fast, any arch):
#   docker compose -f test-container/docker-compose.yml run test-arm64
#   docker compose -f test-container/docker-compose.yml run test-amd64
#   docker compose -f test-container/docker-compose.yml up test-arm64 test-amd64
#
# Kodi integration (requires Kodi PPA — ARM64 only on Apple Silicon):
#   docker compose -f test-container/docker-compose.yml run kodi-arm64 shell
#   docker compose -f test-container/docker-compose.yml up kodi-arm64

services:
  # --- Unit Tests (lightweight, no Kodi required) ---

  # ARM64 — matches Android TV boxes (Onn, Shield, Fire Stick 4K)
  test-arm64:
    build:
      context: .
      dockerfile: Dockerfile.test
    platform: linux/arm64
    image: skipintro-test:arm64
    volumes:
      - ..:/addon

  # x86_64 — matches Linux HTPCs, Intel NUCs, Windows PCs
  test-amd64:
    build:
      context: .
      dockerfile: Dockerfile.test
    platform: linux/amd64
    image: skipintro-test:amd64
    volumes:
      - ..:/addon

  # --- Kodi Integration Tests (full Kodi with web interface) ---

  # ARM64 with Kodi headless for E2E testing
  kodi-arm64:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    image: kodi-skipintro-test:arm64
    volumes:
      - ..:/addon
    ports:
      - "8080:8080"
      - "9090:9090"
