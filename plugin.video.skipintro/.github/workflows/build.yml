name: Build and Release

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test tooling
        run: python -m pip install coverage

      - name: Run unit tests with coverage report
        run: ./test-container/run-coverage.sh

      - name: Get version from addon.xml
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml | head -1)
          echo "ADDON_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version $VERSION"

      - name: Create Add-on Zip (allowlist only)
        run: |
          mkdir -p _build/plugin.video.skipintro
          cp addon.xml default.py context.py database_tools.py browse_path.py \
             _build/plugin.video.skipintro/
          cp -r resources _build/plugin.video.skipintro/
          find _build -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find _build -name "*.pyc" -delete 2>/dev/null || true
          rm -rf _build/plugin.video.skipintro/test-container 2>/dev/null || true
          cd _build && zip -r "../plugin.video.skipintro-${ADDON_VERSION}.zip" plugin.video.skipintro/

      - name: Verify zip contains no secrets
        run: |
          if unzip -l "plugin.video.skipintro-${ADDON_VERSION}.zip" | grep -qE '\.git/|\.github/|test_|reload\.py|passwords\.xml|\.env'; then
            echo "ERROR: Zip contains files that should not be shipped!"
            exit 1
          fi
          echo "OK"

      - name: Create Tag
        run: |
          git config --global user.email "amgad@yahoo.com"
          git config --global user.name "amgadabdelhafez"
          git tag -a "v${ADDON_VERSION}" -m "Release v${ADDON_VERSION}"
          git push origin "v${ADDON_VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: plugin.video.skipintro-${{ env.ADDON_VERSION }}.zip
          tag_name: v${{ env.ADDON_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
